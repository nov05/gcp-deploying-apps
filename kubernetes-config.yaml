---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-deployment
  labels:
    app: devops
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops
      tier: frontend
  template:
    metadata:
      labels:
        app: devops
        tier: frontend
    spec:
      containers:
      - name: devops-demo
        # image: # <YOUR IMAGE PATH HERE>
        # image: us-east4-docker.pkg.dev/qwiklabs-gcp-01-4c781bfff05d/devops-demo/devops-image:v0.2
        # image: us-east4-docker.pkg.dev/qwiklabs-gcp-03-fb1f931381f5/devops-demo/devops-image:latest
        image: "${ALLOWED_REGION}-docker.pkg.dev/${DEVSHELL_PROJECT_ID}/devops-demo/devops-image:v0.2"
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: devops-deployment-lb
  labels:
    app: devops
    tier: frontend-lb
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: devops
    tier: frontend
